<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wireframe Relay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 13px; background: #fff; color: #1f2328; padding: 16px; line-height: 1.5;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
    .dot.err { background: #f44336; }
    h2 { font-size: 14px; font-weight: 600; }
    .sub { color: #57606a; font-size: 12px; margin-bottom: 8px; }
    .stat { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #e5e7eb; }
    .stat-label { color: #57606a; }
    .stat-value { font-weight: 600; }
    .log {
      margin-top: 12px; background: #f7f8fa; border: 1px solid #e5e7eb;
      border-radius: 4px; padding: 8px; font-size: 11px;
      font-family: "SFMono-Regular", "Consolas", monospace;
      color: #57606a; height: 120px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .log .err-line { color: #c0392b; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <h2>Wireframe Relay</h2>
  </div>
  <div class="sub" id="status-text">Connecting…</div>
  <div class="stat"><span class="stat-label">Commands executed</span><span class="stat-value" id="cnt-ok">0</span></div>
  <div class="stat"><span class="stat-label">Errors</span><span class="stat-value" id="cnt-err">0</span></div>
  <div class="log" id="log">Waiting…</div>

  <script>
    const BASE = 'http://localhost:7765';
    let ok = 0, errs = 0, connected = false;
    const dot = document.getElementById('dot');
    const statusEl = document.getElementById('status-text');
    const okEl = document.getElementById('cnt-ok');
    const errEl = document.getElementById('cnt-err');
    const logEl = document.getElementById('log');

    function setConnected(v) {
      connected = v;
      dot.className = 'dot' + (v ? '' : ' err');
      statusEl.textContent = v ? 'Relay active — polling localhost:7765' : 'Relay unreachable — retrying…';
    }

    function log(msg, isErr) {
      const t = new Date().toLocaleTimeString('en-US', { hour12: false });
      const line = document.createElement('div');
      if (isErr) line.className = 'err-line';
      line.textContent = '[' + t + '] ' + msg;
      logEl.insertBefore(line, logEl.firstChild);
    }

    const pending = new Map();
    window.onmessage = function(e) {
      const m = e.data.pluginMessage;
      if (!m) return;
      if (m.type === 'command_result') {
        const p = pending.get(m.id);
        if (p) { pending.delete(m.id); m.error ? p.reject(new Error(m.error)) : p.resolve(m.figmaNodeId); }
      }
    };

    function sendToPlugin(cmd) {
      return new Promise((resolve, reject) => {
        pending.set(cmd.id, { resolve, reject });
        parent.postMessage({ pluginMessage: { type: 'execute_command', command: cmd } }, '*');
      });
    }

    async function processCommands(cmds) {
      // Server returns QueuedCommand {id, command, status} — extract inner command
      for (const item of cmds) {
        // Server returns QueuedCommand {id, command:{...}, status} — use inner command
        const cmd = item.command || item;
        const qid = item.id || cmd.id;
        try {
          log('▶ ' + cmd.type + ' [' + qid.slice(0,8) + ']');
          await sendToPlugin(cmd);
          await fetch(BASE + '/commands/' + qid, { method: 'DELETE' });
          ok++; okEl.textContent = ok;
          log('✓ ' + cmd.type);
        } catch(err) {
          errs++; errEl.textContent = errs;
          log('✗ ' + cmd.type + ': ' + String(err), true);
          try { await fetch(BASE + '/commands/' + qid, { method: 'DELETE' }); } catch(_) {}
        }
      }
    }

    async function poll() {
      try {
        const res = await fetch(BASE + '/commands', { headers: { Accept: 'application/json' } });
        if (!res.ok) { setConnected(false); return; }
        if (!connected) { setConnected(true); log('Connected to relay server'); }
        const cmds = await res.json();
        if (Array.isArray(cmds) && cmds.length > 0) await processCommands(cmds);
      } catch(e) {
        setConnected(false);
      }
    }

    poll().then(() => setInterval(poll, 500));
  </script>
</body>
</html>
